<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">DayBreak Detailed Data Flow</title>
  <desc id="desc">Step-by-step data flow for DayBreak from schedule trigger to email and dashboard.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 30px Arial, Helvetica, sans-serif;fill:#0f172a}
      .subtitle{font:400 16px Arial, Helvetica, sans-serif;fill:#475569}
      .card{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:14;filter:url(#shadow)}
      .blue{fill:#eff6ff;stroke:#2563eb}
      .purple{fill:#f5f3ff;stroke:#7c3aed}
      .amber{fill:#fffbeb;stroke:#f59e0b}
      .green{fill:#f0fdfa;stroke:#0f766e}
      .rose{fill:#fff1f2;stroke:#e11d48}
      .label{font:700 16px Arial, Helvetica, sans-serif;fill:#0f172a}
      .small{font:400 13px Arial, Helvetica, sans-serif;fill:#475569}
      .tiny{font:700 11px Arial, Helvetica, sans-serif;fill:#64748b}
      .nodeText{font:800 18px Arial, Helvetica, sans-serif;fill:#fff}
      .arrow{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .arrowGreen{stroke:#0f766e;stroke-width:3;fill:none;marker-end:url(#arrowGreen)}
      .dash{stroke-dasharray:8 7}
      .swim{fill:#ffffff;stroke:#dbe3ee;stroke-width:2;rx:18}
      .swimTitle{font:700 18px Arial, Helvetica, sans-serif;fill:#334155}
      .note{fill:#fff7ed;stroke:#fb923c;stroke-width:2;rx:12}
    </style>
  </defs>

  <rect class="bg" width="1440" height="980"/>
  <text class="title" x="54" y="58">DayBreak Detailed Data Flow</text>
  <text class="subtitle" x="54" y="86">Basic step-by-step flow from autonomous trigger to Gmail email and React dashboard history.</text>

  <rect class="swim" x="42" y="125" width="1356" height="186"/>
  <text class="swimTitle" x="70" y="160">1. Wake Up and Prepare</text>
  <rect class="swim" x="42" y="346" width="1356" height="255"/>
  <text class="swimTitle" x="70" y="381">2. Gather Context and Reason</text>
  <rect class="swim" x="42" y="636" width="1356" height="210"/>
  <text class="swimTitle" x="70" y="671">3. Deliver, Store, and Showcase</text>

  <g transform="translate(78 188)">
    <rect class="card blue" width="210" height="86"/>
    <circle cx="28" cy="28" r="18" fill="#2563eb"/>
    <text class="nodeText" x="22" y="34">1</text>
    <text class="label" x="58" y="30">Schedule fires</text>
    <text class="small" x="18" y="57">EventBridge Scheduler</text>
    <text class="small" x="18" y="75">6 AM or demo one-time run</text>
  </g>

  <g transform="translate(360 188)">
    <rect class="card purple" width="210" height="86"/>
    <circle cx="28" cy="28" r="18" fill="#7c3aed"/>
    <text class="nodeText" x="22" y="34">2</text>
    <text class="label" x="58" y="30">Lambda starts</text>
    <text class="small" x="18" y="57">Receives optional date</text>
    <text class="small" x="18" y="75">Registers idempotency key</text>
  </g>

  <g transform="translate(642 188)">
    <rect class="card amber" width="230" height="86"/>
    <circle cx="28" cy="28" r="18" fill="#f59e0b"/>
    <text class="nodeText" x="22" y="34">3</text>
    <text class="label" x="58" y="30">Load settings</text>
    <text class="small" x="18" y="57">SSM /daybreak/config</text>
    <text class="small" x="18" y="75">Gmail provider, tone, profile</text>
  </g>

  <g transform="translate(944 188)">
    <rect class="card green" width="244" height="86"/>
    <circle cx="28" cy="28" r="18" fill="#0f766e"/>
    <text class="nodeText" x="22" y="34">4</text>
    <text class="label" x="58" y="30">Create run context</text>
    <text class="small" x="18" y="57">Brief date + profile</text>
    <text class="small" x="18" y="75">Passed into agent tools</text>
  </g>

  <path class="arrow" d="M288 231 H360"/>
  <path class="arrow" d="M570 231 H642"/>
  <path class="arrow" d="M872 231 H944"/>

  <g transform="translate(78 420)">
    <rect class="card blue" width="210" height="106"/>
    <circle cx="28" cy="28" r="18" fill="#2563eb"/>
    <text class="nodeText" x="22" y="34">5</text>
    <text class="label" x="58" y="30">Task tool</text>
    <text class="small" x="18" y="57">Queries DynamoDB tasks</text>
    <text class="small" x="18" y="76">Finds overdue / due today</text>
    <text class="small" x="18" y="95">Limits top priorities</text>
  </g>

  <g transform="translate(340 420)">
    <rect class="card purple" width="210" height="106"/>
    <circle cx="28" cy="28" r="18" fill="#7c3aed"/>
    <text class="nodeText" x="22" y="34">6</text>
    <text class="label" x="58" y="30">Stale tool</text>
    <text class="small" x="18" y="57">Finds quiet threads</text>
    <text class="small" x="18" y="76">Uses stale_after_days</text>
    <text class="small" x="18" y="95">Prepares nudge context</text>
  </g>

  <g transform="translate(602 420)">
    <rect class="card amber" width="210" height="106"/>
    <circle cx="28" cy="28" r="18" fill="#f59e0b"/>
    <text class="nodeText" x="22" y="34">7</text>
    <text class="label" x="58" y="30">Weather / RSS</text>
    <text class="small" x="18" y="57">Open-Meteo forecast</text>
    <text class="small" x="18" y="76">Optional feed headlines</text>
    <text class="small" x="18" y="95">Graceful fallback</text>
  </g>

  <g transform="translate(864 420)">
    <rect class="card green" width="230" height="106"/>
    <circle cx="28" cy="28" r="18" fill="#0f766e"/>
    <text class="nodeText" x="22" y="34">8</text>
    <text class="label" x="58" y="30">Bedrock Nova</text>
    <text class="small" x="18" y="57">Chooses useful tool calls</text>
    <text class="small" x="18" y="76">Reasons over returned JSON</text>
    <text class="small" x="18" y="95">Outputs strict brief schema</text>
  </g>

  <g transform="translate(1166 420)">
    <rect class="card rose" width="190" height="106"/>
    <circle cx="28" cy="28" r="18" fill="#e11d48"/>
    <text class="nodeText" x="22" y="34">9</text>
    <text class="label" x="58" y="30">Brief object</text>
    <text class="small" x="18" y="57">Validated dataclass</text>
    <text class="small" x="18" y="76">priorities, schedule,</text>
    <text class="small" x="18" y="95">follow-ups, weather</text>
  </g>

  <path class="arrow dash" d="M1188 274 C1188 340 190 340 190 420"/>
  <path class="arrow" d="M288 473 H340"/>
  <path class="arrow" d="M550 473 H602"/>
  <path class="arrow" d="M812 473 H864"/>
  <path class="arrow" d="M1094 473 H1166"/>

  <g transform="translate(78 710)">
    <rect class="card green" width="220" height="92"/>
    <circle cx="28" cy="28" r="18" fill="#0f766e"/>
    <text class="nodeText" x="22" y="34">10</text>
    <text class="label" x="58" y="30">Render email</text>
    <text class="small" x="18" y="58">HTML + plain text</text>
    <text class="small" x="18" y="77">subject line with date</text>
  </g>

  <g transform="translate(374 710)">
    <rect class="card green" width="220" height="92"/>
    <circle cx="28" cy="28" r="18" fill="#0f766e"/>
    <text class="nodeText" x="22" y="34">11</text>
    <text class="label" x="58" y="30">Send via Gmail</text>
    <text class="small" x="18" y="58">SMTP app password</text>
    <text class="small" x="18" y="77">message id returned</text>
  </g>

  <g transform="translate(670 710)">
    <rect class="card blue" width="220" height="92"/>
    <circle cx="28" cy="28" r="18" fill="#2563eb"/>
    <text class="nodeText" x="22" y="34">12</text>
    <text class="label" x="58" y="30">Store brief</text>
    <text class="small" x="18" y="58">DynamoDB briefs table</text>
    <text class="small" x="18" y="77">createdAt + TTL + id</text>
  </g>

  <g transform="translate(966 710)">
    <rect class="card purple" width="220" height="92"/>
    <circle cx="28" cy="28" r="18" fill="#7c3aed"/>
    <text class="nodeText" x="22" y="34">13</text>
    <text class="label" x="58" y="30">Dashboard reads</text>
    <text class="small" x="18" y="58">Function URL API</text>
    <text class="small" x="18" y="77">history + status colors</text>
  </g>

  <path class="arrowGreen" d="M1260 526 C1260 620 188 620 188 710"/>
  <path class="arrowGreen" d="M298 756 H374"/>
  <path class="arrowGreen" d="M594 756 H670"/>
  <path class="arrowGreen" d="M890 756 H966"/>

  <rect class="note" x="1032" y="860" width="326" height="72"/>
  <text class="label" x="1052" y="888">Demo proof</text>
  <text class="small" x="1052" y="912">A one-time Scheduler run created the Gmail email</text>
  <text class="small" x="1052" y="930">and stored the 2026-07-21 dashboard record.</text>
</svg>
