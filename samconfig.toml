version = 0.1

[default.global.parameters]
stack_name = "daybreak-agent"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "us-east-1"
# Fill these in or pass with --parameter-overrides on the CLI:
# parameter_overrides = "SenderEmail=you@example.com RecipientEmail=you@example.com AlarmEmail=you@example.com UserName=Parthiban Latitude=33.749 Longitude=-84.388"
